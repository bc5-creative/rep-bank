<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#22130d" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="stylesheet" href="style.css" />
<title>done</title>
</head>
<body>
<main class="app">
<header class="top"><div class="brand">done</div><div class="date" id="dateText"></div></header>

<section id="todayView">
<section class="hero">
<div class="brief-label" id="briefLabel">Today’s brief</div>

<button class="target-disc" onclick="toggleDisc()" aria-label="Show today’s record">
<div class="disc-face" id="discFront">
<div class="target-number" id="pushTarget">0</div>
<div class="target-unit">push-ups</div>
</div>
<div class="disc-face hide" id="discBack">
<div class="back-title">Today</div>
<div class="back-list" id="discBackList"></div>
<div class="back-total" id="discBackTotal">0</div>
</div>
</button>

<div class="progress-card">
<div class="progress-header">
<div><div class="progress-big" id="pushDone">0</div><div class="progress-label">completed</div></div>
<div><div class="progress-big red" id="pushRemaining">0</div><div class="progress-label">remaining</div></div>
</div>
<div class="segments" id="pushSegments">
<div class="seg seg1"><div class="segfill"></div></div>
<div class="seg seg2"><div class="segfill"></div></div>
<div class="seg seg3"><div class="segfill"></div></div>
<div class="seg seg4"><div class="segfill"></div></div>
</div>
<div class="stamp hide" id="pushRecorded">done.</div>
<button class="record-button" onclick="openRecordSheet()">Record</button>
</div>
</section>

<section class="drawer-card"><div class="section-label">Today’s record</div><div class="history" id="pushHistory"></div></section>
<section class="drawer-card"><div class="section-label">Other things done</div><div id="commitmentsList"></div></section>
</section>

<section id="reviewView" class="hide view-panel">
<section class="drawer-card"><div class="section-label">Review</div>
<div class="grid">
<div class="stat"><div class="stat-num" id="weekPushTotal">0</div><div class="stat-label">push-ups this week</div></div>
<div class="stat"><div class="stat-num" id="allPushTotal">0</div><div class="stat-label">push-ups total</div></div>
<div class="stat"><div class="stat-num" id="parkRunTotal">0</div><div class="stat-label">ParkRuns this year</div></div>
<div class="stat"><div class="stat-num" id="parkRunRemain">35</div><div class="stat-label">ParkRuns remaining</div></div>
<div class="stat"><div class="stat-num" id="dryWeek">0</div><div class="stat-label">Dry Days</div></div>
<div class="stat"><div class="stat-num" id="socialWeek">0</div><div class="stat-label">social-free</div></div>
</div></section>
</section>

<section id="settingsView" class="hide view-panel">
<section class="drawer-card"><div class="section-label">Settings</div>
<div class="settings-grid">
<label><span>ParkRuns already completed this year</span><input id="parkRunStartingTotal" type="number" min="0" max="35" /></label>
<label><span>Push-up challenge start date</span><input id="pushStartDate" type="date" /></label>
<button class="record-button" onclick="saveSettings()">Save settings</button>
<button class="secondary" onclick="regeneratePushupChallenge()">Regenerate push-up plan</button>
<button class="danger" onclick="resetAll()">Reset all app data</button>
</div></section>
</section>

<nav class="bottom-nav"><button onclick="setView('today')" id="navToday">Today</button><button onclick="setView('review')" id="navReview">Review</button><button onclick="setView('settings')" id="navSettings">Settings</button></nav>
<div class="tagline">collect what you’ve done.</div>
</main>

<div class="sheet hide" id="recordSheet">
<div class="sheet-panel">
<button class="sheet-close" onclick="closeRecordSheet()">×</button>
<div class="section-label">Record push-ups</div>
<div class="entry-number" id="recordAmount">20</div>
<div class="adjust-grid"><button onclick="adjustRecord(-5)">−5</button><button onclick="adjustRecord(-1)">−1</button><button onclick="adjustRecord(1)">+1</button><button onclick="adjustRecord(5)">+5</button></div>
<div class="preset-grid"><button onclick="setRecordAmount(10)">10</button><button onclick="setRecordAmount(15)">15</button><button onclick="setRecordAmount(20)">20</button><button onclick="setRecordAmount(25)">25</button></div>
<button class="record-button" onclick="recordPushups()">Record</button>
</div>
</div>

<script src="app.js"></script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./service-worker.js").catch(()=>{})})}</script>
</body>
</html>
