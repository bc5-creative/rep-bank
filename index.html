<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Rep Bank</title>
  <style>
    :root {
      --bg: #f3efe6;
      --ink: #151515;
      --muted: #6d675d;
      --card: #fffaf0;
      --line: #d8d0c0;
      --accent: #c9322b;
      --accent-dark: #9f241f;
      --rest: #2f5d50;
      --shadow: 0 14px 40px rgba(0,0,0,0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #fff8ea 0%, var(--bg) 45%, #e9dfcf 100%);
      color: var(--ink);
      min-height: 100vh;
      padding: env(safe-area-inset-top) 18px env(safe-area-inset-bottom);
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 22px 0 32px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 28px;
      letter-spacing: -0.04em;
      margin: 0;
    }

    .date {
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    .card {
      background: rgba(255,250,240,0.9);
      border: 1px solid rgba(216,208,192,0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 16px;
      backdrop-filter: blur(12px);
    }

    .target-label {
      color: var(--muted);
      font-weight: 750;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .target {
      font-size: 76px;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.08em;
      margin: 8px 0 12px;
    }

    .target span {
      font-size: 18px;
      letter-spacing: 0;
      color: var(--muted);
      margin-left: 6px;
    }

    .bar-wrap {
      background: #e5dccb;
      border-radius: 99px;
      height: 18px;
      overflow: hidden;
      margin: 16px 0 10px;
      border: 1px solid #d1c7b7;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-dark));
      border-radius: 99px;
      transition: width 0.25s ease;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .mini {
      background: rgba(255,255,255,0.55);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }

    .mini .num {
      font-size: 28px;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .mini .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 16px 8px;
      font-size: 18px;
      font-weight: 850;
      background: var(--ink);
      color: white;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active { transform: scale(0.98); }

    button.secondary {
      background: #efe5d4;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    button.danger {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    button.rest {
      background: var(--rest);
      color: white;
    }

    .custom {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 10px;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 0 16px;
      font-size: 18px;
      font-weight: 750;
      background: #fffaf0;
      color: var(--ink);
    }

    .history {
      display: grid;
      gap: 9px;
      margin-top: 8px;
    }

    .entry {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-weight: 700;
      border-bottom: 1px solid rgba(216,208,192,0.75);
      padding-bottom: 8px;
    }

    .settings {
      display: grid;
      gap: 10px;
    }

    .setting-line {
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 10px;
      align-items: center;
    }

    .setting-line label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
    }

    .setting-line input {
      min-height: 48px;
      text-align: center;
    }

    .rest-message {
      font-size: 38px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.06em;
      margin: 12px 0;
      color: var(--rest);
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 10px;
    }

    @media (max-width: 360px) {
      .target { font-size: 64px; }
      button { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Rep Bank</h1>
      <div class="date" id="todayText"></div>
    </header>

    <section class="card" id="mainCard">
      <div class="target-label">Today’s target</div>
      <div id="activeView">
        <div class="target"><span id="targetNum">0</span><span>push-ups</span></div>
        <div class="bar-wrap"><div class="bar" id="progressBar"></div></div>
        <div class="stats-row">
          <div class="mini">
            <div class="num" id="completedNum">0</div>
            <div class="label">Completed</div>
          </div>
          <div class="mini">
            <div class="num" id="remainingNum">0</div>
            <div class="label">Remaining</div>
          </div>
        </div>

        <div class="buttons">
          <button onclick="addReps(5)">+5</button>
          <button onclick="addReps(10)">+10</button>
          <button onclick="addReps(15)">+15</button>
          <button onclick="addReps(20)">+20</button>
        </div>

        <div class="custom">
          <input id="customInput" inputmode="numeric" pattern="[0-9]*" placeholder="Custom amount" />
          <button onclick="addCustom()">Bank</button>
        </div>
      </div>

      <div id="restView" style="display:none;">
        <div class="rest-message">Rest day.</div>
        <p style="color:var(--muted);font-weight:700;margin:0;">No target today. Shoulders say thanks.</p>
      </div>
    </section>

    <section class="card">
      <div class="stats-row">
        <div class="mini">
          <div class="num" id="weekNum">0</div>
          <div class="label">This week</div>
        </div>
        <div class="mini">
          <div class="num" id="lifeNum">0</div>
          <div class="label">Lifetime</div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="target-label">Today’s banked sets</div>
      <div class="history" id="history"></div>
    </section>

    <section class="card">
      <div class="target-label">Controls</div>
      <div class="buttons">
        <button class="secondary" onclick="newTarget()">New target</button>
        <button class="rest" onclick="toggleRestDay()">Rest day</button>
        <button class="danger" onclick="undoLast()">Undo</button>
        <button class="danger" onclick="resetToday()">Reset</button>
      </div>
    </section>

    <section class="card">
      <div class="target-label">Challenge settings</div>
      <div class="settings">
        <div class="setting-line">
          <label for="lowTarget">Low day</label>
          <input id="lowTarget" type="number" min="1" value="50" />
        </div>
        <div class="setting-line">
          <label for="midTarget">Medium day</label>
          <input id="midTarget" type="number" min="1" value="70" />
        </div>
        <div class="setting-line">
          <label for="highTarget">High day</label>
          <input id="highTarget" type="number" min="1" value="95" />
        </div>
        <button class="secondary" onclick="saveSettings()">Save settings</button>
      </div>
    </section>

    <footer>Built for banking reps, not becoming unbearable at barbecues.</footer>
  </main>

  <script>
    const STORAGE_KEY = "repBank.v1";

    const todayKey = () => new Date().toISOString().slice(0, 10);

    const niceDate = () => {
      return new Intl.DateTimeFormat("en-AU", {
        weekday: "short",
        day: "numeric",
        month: "short"
      }).format(new Date());
    };

    const defaultState = () => ({
      settings: { low: 50, mid: 70, high: 95 },
      days: {}
    });

    let state = loadState();

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return defaultState();
      try {
        return { ...defaultState(), ...JSON.parse(saved) };
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function randomBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateTarget() {
      const { low, mid, high } = state.settings;
      const patterns = [
        () => randomBetween(Math.max(1, low - 8), low + 8),
        () => randomBetween(Math.max(1, mid - 10), mid + 10),
        () => randomBetween(Math.max(1, high - 12), high + 12)
      ];
      const choice = patterns[Math.floor(Math.random() * patterns.length)];
      return choice();
    }

    function today() {
      const key = todayKey();
      if (!state.days[key]) {
        state.days[key] = {
          target: generateTarget(),
          reps: [],
          rest: false
        };
        saveState();
      }
      return state.days[key];
    }

    function addReps(num) {
      const day = today();
      if (day.rest) return;
      day.reps.push({ amount: num, time: new Date().toLocaleTimeString("en-AU", { hour: "2-digit", minute: "2-digit" }) });
      saveState();
      render();
    }

    function addCustom() {
      const input = document.getElementById("customInput");
      const num = parseInt(input.value, 10);
      if (!Number.isFinite(num) || num <= 0) return;
      addReps(num);
      input.value = "";
    }

    function undoLast() {
      const day = today();
      day.reps.pop();
      saveState();
      render();
    }

    function resetToday() {
      if (!confirm("Reset today’s banked push-ups?")) return;
      const day = today();
      day.reps = [];
      saveState();
      render();
    }

    function newTarget() {
      const day = today();
      if (!confirm("Generate a new target for today?")) return;
      day.target = generateTarget();
      day.reps = [];
      day.rest = false;
      saveState();
      render();
    }

    function toggleRestDay() {
      const day = today();
      day.rest = !day.rest;
      saveState();
      render();
    }

    function saveSettings() {
      state.settings.low = parseInt(document.getElementById("lowTarget").value, 10) || 50;
      state.settings.mid = parseInt(document.getElementById("midTarget").value, 10) || 70;
      state.settings.high = parseInt(document.getElementById("highTarget").value, 10) || 95;
      saveState();
      render();
    }

    function getCompleted(day) {
      return day.reps.reduce((sum, rep) => sum + rep.amount, 0);
    }

    function getWeekTotal() {
      const now = new Date();
      const day = now.getDay();
      const diffToMonday = (day + 6) % 7;
      const monday = new Date(now);
      monday.setDate(now.getDate() - diffToMonday);
      monday.setHours(0,0,0,0);

      return Object.entries(state.days).reduce((sum, [date, data]) => {
        const d = new Date(date + "T00:00:00");
        return d >= monday ? sum + getCompleted(data) : sum;
      }, 0);
    }

    function getLifetimeTotal() {
      return Object.values(state.days).reduce((sum, data) => sum + getCompleted(data), 0);
    }

    function render() {
      const day = today();
      const completed = getCompleted(day);
      const remaining = Math.max(0, day.target - completed);
      const percent = day.target > 0 ? Math.min(100, (completed / day.target) * 100) : 0;

      document.getElementById("todayText").textContent = niceDate();
      document.getElementById("targetNum").textContent = day.target;
      document.getElementById("completedNum").textContent = completed;
      document.getElementById("remainingNum").textContent = remaining;
      document.getElementById("progressBar").style.width = percent + "%";
      document.getElementById("weekNum").textContent = getWeekTotal();
      document.getElementById("lifeNum").textContent = getLifetimeTotal();

      document.getElementById("activeView").style.display = day.rest ? "none" : "block";
      document.getElementById("restView").style.display = day.rest ? "block" : "none";

      document.getElementById("lowTarget").value = state.settings.low;
      document.getElementById("midTarget").value = state.settings.mid;
      document.getElementById("highTarget").value = state.settings.high;

      const history = document.getElementById("history");
      history.innerHTML = "";
      if (day.reps.length === 0) {
        const empty = document.createElement("div");
        empty.className = "entry";
        empty.innerHTML = "<span>No sets banked yet</span><span>—</span>";
        history.appendChild(empty);
      } else {
        [...day.reps].reverse().forEach(rep => {
          const row = document.createElement("div");
          row.className = "entry";
          row.innerHTML = `<span>${rep.time}</span><span>+${rep.amount}</span>`;
          history.appendChild(row);
        });
      }
    }

    document.getElementById("customInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") addCustom();
    });

    render();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
